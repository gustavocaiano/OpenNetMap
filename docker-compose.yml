services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openetmap}
      POSTGRES_USER: ${POSTGRES_USER:-openetmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openetmap}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: openetmap-api:dev
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://openetmap:openetmap@db:5432/openetmap}
      RAW_SCAN_OUTPUT_DIR: ${RAW_SCAN_OUTPUT_DIR:-/var/lib/openetmap/scans}
      NMAP_BIN: ${NMAP_BIN:-/usr/bin/nmap}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "8000:8000"
    volumes:
      - scan_data:/var/lib/openetmap/scans

  worker:
    image: openetmap-api:dev
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://openetmap:openetmap@db:5432/openetmap}
      RAW_SCAN_OUTPUT_DIR: ${RAW_SCAN_OUTPUT_DIR:-/var/lib/openetmap/scans}
      NMAP_BIN: ${NMAP_BIN:-/usr/bin/nmap}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
    command: ["python", "-m", "app.workers.main"]
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - scan_data:/var/lib/openetmap/scans

  web:
    build:
      context: ./apps/web
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  scan_data:
